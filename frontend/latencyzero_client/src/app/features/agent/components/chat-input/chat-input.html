@if (s.currentChatId()) {
<div class="p-4 border-t border-slate-800 bg-slate-950/60">
  <div class="max-w-4xl mx-auto">
    <div
      class="flex items-end gap-3 bg-slate-900 border border-slate-700 focus-within:border-yellow-500/50 rounded-2xl p-3 transition-colors"
    >

      <!-- Textarea -->
      <textarea
        #ta
        [(ngModel)]="newMessage"
        (keydown)="onKeydown($event, ta)"
        (input)="autoResize(ta)"
        placeholder="Pregunta a LatencyZero AI"
        rows="1"
        class="flex-1 bg-transparent text-slate-100 text-sm placeholder-slate-500 outline-none resize-none max-h-40 overflow-y-auto leading-relaxed scrollbar-thin py-1"
        [disabled]="s.isTyping()"
      ></textarea>

      <!-- Botón abrir modal -->
      <button
        (click)="openModal()"
        class="w-9 h-9 flex items-center justify-center rounded-xl bg-slate-700 hover:bg-slate-600 text-slate-200 transition-all"
        title="Adjuntar imagen"
      >
        📷
      </button>

      <!-- Botón enviar -->
      <button
        (click)="send(ta)"
        [disabled]="(!newMessage.trim() && !file) || s.isTyping()"
        class="w-9 h-9 flex items-center justify-center rounded-xl bg-yellow-500 hover:bg-yellow-400 disabled:opacity-30 disabled:cursor-not-allowed text-slate-950 transition-all shrink-0 cursor-pointer"
        title="Enviar mensaje"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4.5 h-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 10.5L12 3m0 0l7.5 7.5M12 3v18" />
        </svg>
      </button>
    </div>
    <p class="text-xs text-slate-600 text-center mt-2">
      <kbd class="font-mono">Enter</kbd> para enviar ·
      <kbd class="font-mono">Shift+Enter</kbd> para nueva línea
    </p>
  </div>
</div>

<!-- Modal de imagen -->
<div *ngIf="showModal" class="fixed inset-0 bg-black/70 flex items-center justify-center z-50">
  <div class="bg-slate-900 rounded-xl p-4 max-w-lg w-full relative">

    <!-- Preview -->
    <div class="w-full h-64 bg-slate-800 rounded-md mb-3 flex items-center justify-center overflow-hidden">
      <ng-container *ngIf="filePreview; else emptyState">
        <img [src]="filePreview" alt="Imagen subida" class="object-contain w-full h-full"/>
      </ng-container>
      <ng-template #emptyState>
        <span class="text-slate-400">No hay imagen</span>
      </ng-template>
    </div>

    <!-- Botones -->
    <div class="flex justify-between gap-2 mb-3">
      <button
        (click)="changeFile()"
        class="flex-1 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded-md"
      >
        Cambiar imagen
      </button>
      <button
        (click)="removeFile()"
        class="flex-1 py-2 bg-red-500 hover:bg-red-600 text-white rounded-md"
      >
        Eliminar
      </button>
      <button
        (click)="saveFile()"
        class="flex-1 py-2 bg-green-500 hover:bg-green-600 text-white rounded-md"
      >
        Guardar imagen
      </button>
    </div>

    <!-- Cerrar modal con diseño estilo “X” del segundo componente -->
    <button
      (click)="showModal = false"
      class="absolute top-3 right-3 z-30 p-2 sm:p-2.5 bg-red-500 hover:bg-red-600 text-white rounded-full shadow-lg transition-all hover:scale-125 backdrop-blur-sm hover:shadow-red-500/50"
      title="Cerrar"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 sm:h-6 sm:w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>

    <!-- Input oculto -->
    <input type="file" accept="image/*" (change)="onFileSelected($event)" class="hidden">

  </div>
</div>

    <!-- Input oculto -->
    <input type="file" accept="image/*" (change)="onFileSelected($event)" class="hidden">

}
