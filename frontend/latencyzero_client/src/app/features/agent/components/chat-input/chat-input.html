@if (s.currentChatId()) {
<div class="p-4 border-t border-slate-800 bg-slate-950/60">
  <div class="max-w-4xl mx-auto">
    <div
      class="flex items-end gap-3 bg-slate-900 border border-slate-700 focus-within:border-yellow-500/50 rounded-2xl p-3 transition-colors"
    >

      <!-- Textarea -->
      <textarea
        #ta
        [(ngModel)]="newMessage"
        (keydown)="onKeydown($event, ta)"
        (input)="autoResize(ta)"
        placeholder="Pregunta a LatencyZero AI"
        rows="1"
        class="flex-1 bg-transparent text-slate-100 text-sm placeholder-slate-500 outline-none resize-none max-h-40 overflow-y-auto leading-relaxed scrollbar-thin py-1"
        [disabled]="s.isTyping()"
      ></textarea>

      <!-- Boton adjuntar imagen -->
      <button
        (click)="openModal()"
        class="relative w-9 h-9 flex items-center justify-center rounded-xl border transition-all cursor-pointer shrink-0"
        [class]="file
          ? 'bg-yellow-500/10 border-yellow-500/40 text-yellow-400 hover:bg-yellow-500/20'
          : 'bg-transparent border-slate-700 text-slate-500 hover:border-yellow-500/30 hover:text-yellow-400 hover:bg-slate-800'"
        title="Adjuntar imagen"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4.5 h-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909M13.5 12h.008v.008H13.5V12zm-3 3.75H6a2.25 2.25 0 01-2.25-2.25V6A2.25 2.25 0 016 3.75h12A2.25 2.25 0 0120.25 6v7.5" />
        </svg>
        @if (file) {
        <span class="absolute -top-1 -right-1 w-2.5 h-2.5 bg-yellow-500 rounded-full border-2 border-slate-950 block"></span>
        }
      </button>

      <!-- Boton enviar -->
      <button
        (click)="send(ta)"
        [disabled]="(!newMessage.trim() && !file) || s.isTyping()"
        class="w-9 h-9 flex items-center justify-center rounded-xl bg-yellow-500 hover:bg-yellow-400 disabled:opacity-30 disabled:cursor-not-allowed text-slate-950 transition-all shrink-0 cursor-pointer"
        title="Enviar mensaje"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4.5 h-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 10.5L12 3m0 0l7.5 7.5M12 3v18" />
        </svg>
      </button>
    </div>

    @if (file) {
    <div class="flex items-center gap-2 mt-2 px-1">
      <div class="flex items-center gap-2 px-2.5 py-1 bg-yellow-500/8 border border-yellow-500/20 rounded-lg">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 text-yellow-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909M13.5 12h.008v.008H13.5V12zm-3 3.75H6a2.25 2.25 0 01-2.25-2.25V6A2.25 2.25 0 016 3.75h12A2.25 2.25 0 0120.25 6v7.5" />
        </svg>
        <span class="text-xs text-yellow-300 font-medium max-w-40 truncate">{{ file.name }}</span>
        <button (click)="removeFile()" class="ml-1 text-slate-500 hover:text-red-400 transition-colors cursor-pointer" title="Quitar imagen">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
    </div>
    }

    <p class="text-xs text-slate-600 text-center mt-2">
      <kbd class="font-mono">Enter</kbd> para enviar
      <kbd class="font-mono">Shift+Enter</kbd> para nueva linea
    </p>
  </div>
</div>

@if (showModal) {
<div
  class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-end sm:items-center justify-center z-50 p-4"
  (click)="showModal = false"
>
  <div
    class="bg-slate-900 border border-slate-800 rounded-2xl w-full max-w-md shadow-2xl overflow-hidden"
    (click)="$event.stopPropagation()"
  >

    <!-- Header del modal -->
    <div class="flex items-center justify-between px-5 py-4 border-b border-slate-800">
      <div class="flex items-center gap-2.5">
        <div class="w-7 h-7 rounded-lg bg-yellow-500/15 border border-yellow-500/25 flex items-center justify-center">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 text-yellow-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909M13.5 12h.008v.008H13.5V12zm-3 3.75H6a2.25 2.25 0 01-2.25-2.25V6A2.25 2.25 0 016 3.75h12A2.25 2.25 0 0120.25 6v7.5" />
          </svg>
        </div>
        <div>
          <h3 class="text-sm font-semibold text-white leading-none">Imagen adjunta</h3>
          <p class="text-xs text-slate-500 leading-none mt-0.5">Previsualiza antes de enviar</p>
        </div>
      </div>
      <button
        (click)="showModal = false"
        class="w-7 h-7 flex items-center justify-center rounded-lg text-slate-500 hover:text-white hover:bg-slate-800 transition-all cursor-pointer"
        title="Cerrar"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <!-- Zona de previsualizacion -->
    <div class="px-5 py-5">
      <div
        class="w-full h-56 bg-slate-950/60 border-2 border-dashed rounded-xl overflow-hidden flex items-center justify-center transition-colors"
        [class]="filePreview ? 'border-yellow-500/25' : 'border-slate-700'"
      >
        @if (filePreview) {
          <img [src]="filePreview" alt="Imagen adjunta" class="object-contain w-full h-full"/>
        } @else {
          <div class="flex flex-col items-center gap-3 text-center px-6">
            <div class="w-12 h-12 rounded-2xl bg-slate-800 border border-slate-700 flex items-center justify-center">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909M13.5 12h.008v.008H13.5V12zm-3 3.75H6a2.25 2.25 0 01-2.25-2.25V6A2.25 2.25 0 016 3.75h12A2.25 2.25 0 0120.25 6v7.5" />
              </svg>
            </div>
            <p class="text-sm text-slate-500">No hay imagen seleccionada</p>
          </div>
        }
      </div>

      @if (file) {
      <div class="flex items-center gap-2 mt-3 px-1">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 text-slate-500 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
        </svg>
        <span class="text-xs text-slate-400 truncate">{{ file.name }}</span>
      </div>
      }
    </div>

    <!-- Acciones del modal -->
    <div class="flex items-center gap-2 px-5 pb-5">
      <button
        (click)="changeFile()"
        class="flex-1 flex items-center justify-center gap-1.5 py-2 px-3 bg-slate-800 hover:bg-slate-700 border border-slate-700 hover:border-slate-600 text-slate-300 hover:text-white text-sm font-medium rounded-xl transition-all cursor-pointer"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
        </svg>
        Cambiar
      </button>
      <button
        (click)="removeFile()"
        class="flex-1 flex items-center justify-center gap-1.5 py-2 px-3 bg-transparent hover:bg-red-500/10 border border-slate-700 hover:border-red-500/40 text-slate-400 hover:text-red-400 text-sm font-medium rounded-xl transition-all cursor-pointer"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
        </svg>
        Eliminar
      </button>
      <button
        (click)="saveFile()"
        class="flex-1 flex items-center justify-center gap-1.5 py-2 px-3 bg-yellow-500 hover:bg-yellow-400 text-slate-950 text-sm font-semibold rounded-xl transition-all cursor-pointer"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
        </svg>
        Confirmar
      </button>
    </div>

  </div>
</div>
}

<!-- Input oculto -->
<input type="file" accept="image/*" (change)="onFileSelected($event)" class="hidden">

}
